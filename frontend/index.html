<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>REPOSITORY RESEARCH TERMINAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@300;400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
/* ── RESET & ROOT ──────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #0a0c0e;
  --bg2:        #111418;
  --bg3:        #181c22;
  --border:     #252b34;
  --border2:    #2f3844;
  --amber:      #e8a940;
  --amber-dim:  #9c6e22;
  --green:      #4caf85;
  --green-dim:  #2a6b50;
  --red:        #d95f5f;
  --muted:      #5a6472;
  --text:       #c8cfd8;
  --text-hi:    #eef0f3;
  --mono:       'Martian Mono', monospace;
  --sans:       'DM Sans', sans-serif;
  --r:          3px;
  --panel-pad:  20px;
  --transition: 180ms ease;
}

html { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.6;
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── SCANLINE OVERLAY ──────────────────────────────────────────────────── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 9999;
  background: repeating-linear-gradient(
    0deg,
    transparent 0px,
    transparent 3px,
    rgba(0,0,0,0.04) 3px,
    rgba(0,0,0,0.04) 4px
  );
  pointer-events: none;
}

/* ── HEADER ────────────────────────────────────────────────────────────── */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.header-logo {
  font-family: var(--mono);
  font-weight: 700;
  font-size: 11px;
  letter-spacing: .18em;
  color: var(--amber);
  text-transform: uppercase;
}

.header-logo span { color: var(--muted); font-weight: 300; }

.header-stats {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  display: flex; gap: 20px;
}
.header-stats b { color: var(--green); font-weight: 600; }

/* ── LAYOUT ────────────────────────────────────────────────────────────── */
.app {
  display: grid;
  grid-template-columns: 320px 1fr;
  flex: 1;
  overflow: hidden;
}

/* ── SIDEBAR ───────────────────────────────────────────────────────────── */
.sidebar {
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow-y: auto;
  padding: var(--panel-pad);
  gap: 20px;
}

/* ── SECTIONS ──────────────────────────────────────────────────────────── */
.section-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

/* ── FORM CONTROLS ─────────────────────────────────────────────────────── */
.field { display: flex; flex-direction: column; gap: 5px; }

.field label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
}

input[type="text"],
input[type="password"],
select {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  color: var(--text-hi);
  font-family: var(--mono);
  font-size: 12px;
  padding: 8px 10px;
  outline: none;
  width: 100%;
  transition: border-color var(--transition);
}
input:focus, select:focus { border-color: var(--amber-dim); }
input::placeholder { color: var(--muted); }
select option { background: var(--bg3); }

/* ── BUTTONS ───────────────────────────────────────────────────────────── */
.btn {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: .1em;
  text-transform: uppercase;
  font-weight: 600;
  padding: 9px 14px;
  border: 1px solid;
  border-radius: var(--r);
  cursor: pointer;
  transition: all var(--transition);
  width: 100%;
  position: relative;
  overflow: hidden;
}
.btn::after {
  content: '';
  position: absolute; inset: 0;
  background: white;
  opacity: 0;
  transition: opacity 80ms;
}
.btn:active::after { opacity: .05; }

.btn-primary {
  background: rgba(232,169,64,.12);
  border-color: var(--amber-dim);
  color: var(--amber);
}
.btn-primary:hover:not(:disabled) {
  background: rgba(232,169,64,.22);
  border-color: var(--amber);
}

.btn-danger {
  background: rgba(217,95,95,.08);
  border-color: #7a3535;
  color: var(--red);
}
.btn-danger:hover:not(:disabled) {
  background: rgba(217,95,95,.18);
  border-color: var(--red);
}

.btn:disabled { opacity: .35; cursor: not-allowed; }

/* ── PROGRESS ──────────────────────────────────────────────────────────── */
.progress-wrap {
  display: none; flex-direction: column; gap: 8px;
}
.progress-wrap.active { display: flex; }

.progress-bar-track {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--amber-dim), var(--amber));
  border-radius: 2px;
  transition: width .4s ease;
  animation: shimmer 2s infinite;
  background-size: 200% 100%;
}
@keyframes shimmer {
  0%   { background-position: -200% 0; }
  100% { background-position:  200% 0; }
}

.progress-msg {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--amber-dim);
  word-break: break-all;
}

.progress-counters {
  display: flex; gap: 12px;
}
.counter {
  display: flex; flex-direction: column; gap: 1px;
}
.counter-val {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 700;
  color: var(--green);
}
.counter-lbl {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
}

/* ── REPO LIST ─────────────────────────────────────────────────────────── */
.repo-list {
  display: flex; flex-direction: column; gap: 4px;
  max-height: 200px;
  overflow-y: auto;
}
.repo-tag {
  font-family: var(--mono);
  font-size: 10px;
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: var(--r);
  color: var(--muted);
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: flex; justify-content: space-between; align-items: center;
}
.repo-tag:hover  { border-color: var(--amber-dim); color: var(--amber); }
.repo-tag.active { border-color: var(--amber); color: var(--amber); background: rgba(232,169,64,.08); }
.repo-tag .dot   { width: 5px; height: 5px; border-radius: 50%; background: var(--green-dim); flex-shrink: 0; }

/* ── MAIN PANEL ────────────────────────────────────────────────────────── */
.main {
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* ── SEARCH BAR ─────────────────────────────────────────────────────────── */
.search-bar {
  display: flex; gap: 8px; align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
}

.search-wrap {
  flex: 1;
  position: relative;
}
.search-wrap::before {
  content: '⌕';
  position: absolute;
  left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--muted);
  font-size: 18px;
  pointer-events: none;
}
#search-input {
  padding-left: 36px;
}

.search-bar select { width: 200px; }

.n-select { width: 80px !important; }

/* ── RESULTS ───────────────────────────────────────────────────────────── */
.results-area {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.results-meta {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  padding: 0 2px;
  flex-shrink: 0;
}
.results-meta b { color: var(--green); }

/* ── RESULT CARD ───────────────────────────────────────────────────────── */
.result-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  transition: border-color var(--transition);
  animation: fadeSlide .2s ease both;
}
.result-card:hover { border-color: var(--border2); }

@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  gap: 10px;
  cursor: pointer;
}
.card-header:hover .card-path { color: var(--amber); }

.card-left { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }

.card-ext {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .08em;
  padding: 2px 6px;
  border: 1px solid var(--border2);
  border-radius: 2px;
  color: var(--amber-dim);
  text-transform: uppercase;
  flex-shrink: 0;
}

.card-path {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: color var(--transition);
}

.card-repo {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  white-space: nowrap;
  flex-shrink: 0;
}

.card-score {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 2px;
  flex-shrink: 0;
}
.score-hi   { color: var(--green);     background: rgba(76,175,133,.12);  border: 1px solid var(--green-dim); }
.score-mid  { color: var(--amber);     background: rgba(232,169,64,.10); border: 1px solid var(--amber-dim); }
.score-lo   { color: var(--muted);     background: rgba(90,100,114,.10); border: 1px solid var(--border2); }

.card-body {
  padding: 0;
  display: none;
}
.card-body.open {
  display: block;
  animation: fadeSlide .15s ease;
}

.card-code {
  font-family: var(--mono);
  font-size: 11px;
  line-height: 1.7;
  color: var(--text);
  padding: 14px;
  overflow-x: auto;
  white-space: pre;
  tab-size: 2;
  background: var(--bg);
  border-top: 1px solid var(--border);
  max-height: 65vh;
  overflow-y: auto;
}

.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 14px;
  border-top: 1px solid var(--border);
  background: var(--bg3);
}
.card-chunk {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
}
.card-link {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--amber-dim);
  text-decoration: none;
  letter-spacing: .08em;
  text-transform: uppercase;
  transition: color var(--transition);
}
.card-link:hover { color: var(--amber); }

/* ── EMPTY / LOADING STATES ─────────────────────────────────────────────── */
.empty-state {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 12px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: .1em;
  text-align: center;
}
.empty-state .big { font-size: 32px; opacity: .3; }
.empty-state p { line-height: 1.8; }

.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--border2);
  border-top-color: var(--amber);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  display: none;
}
.spinner.active { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

.btn-pause {
  background: rgba(76,175,133,.08);
  border-color: var(--green-dim);
  color: var(--green);
}
.btn-pause:hover { background: rgba(76,175,133,.18); border-color: var(--green); }
.btn-pause.paused {
  background: rgba(232,169,64,.10);
  border-color: var(--amber-dim);
  color: var(--amber);
}

/* ── ACTION BUTTONS ─────────────────────────────────────────────────────── */
.card-actions {
  display: flex; gap: 6px; flex-wrap: wrap;
  padding: 8px 14px;
  border-top: 1px solid var(--border);
  background: var(--bg2);
}
.act-btn {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: .08em;
  text-transform: uppercase;
  font-weight: 600;
  padding: 4px 10px;
  border: 1px solid var(--border2);
  border-radius: 2px;
  cursor: pointer;
  background: transparent;
  color: var(--muted);
  transition: all var(--transition);
}
.act-btn:hover { border-color: var(--amber-dim); color: var(--amber); }
.act-btn.running { color: var(--green); border-color: var(--green-dim); }
.act-btn.err     { color: var(--red);   border-color: #7a3535; }

.shell-row {
  display: none; gap: 6px; align-items: center;
  padding: 8px 14px;
  border-top: 1px solid var(--border);
  background: var(--bg);
}
.shell-row.open { display: flex; }
.shell-row input {
  flex: 1; font-size: 11px; padding: 5px 8px;
}
.shell-output {
  display: none;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text);
  background: var(--bg);
  padding: 10px 14px;
  border-top: 1px solid var(--border);
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 200px;
  overflow-y: auto;
}
.shell-output.open { display: block; }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

/* ── TOAST ─────────────────────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 20px; right: 20px; z-index: 9998;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 10px 16px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text);
  opacity: 0;
  transform: translateY(8px);
  transition: all .25s ease;
  pointer-events: none;
  max-width: 340px;
}
#toast.show { opacity: 1; transform: translateY(0); }
#toast.err  { border-color: var(--red); color: var(--red); }
#toast.ok   { border-color: var(--green-dim); color: var(--green); }
</style>
</head>

<body>

<!-- ── HEADER ── -->
<header>
  <div class="header-logo">Repository Research Terminal <span>// v1.0</span></div>
  <div class="header-stats" id="hdr-stats">
    <span>CHUNKS <b id="stat-chunks">0</b></span>
    <span>REPOS <b id="stat-repos">0</b></span>
  </div>
</header>

<!-- ── LAYOUT ── -->
<div class="app">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">

    <!-- INDEX SECTION -->
    <section>
      <div class="section-label">Index a User</div>
      <div class="field" style="margin-bottom:8px">
        <label>GitHub Username</label>
        <input type="text" id="username-input" placeholder="e.g. torvalds"/>
      </div>
      <div class="field" style="margin-bottom:12px">
        <label>Personal Access Token <span style="opacity:.5">(optional)</span></label>
        <input type="password" id="token-input" placeholder="ghp_…"/>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-primary" id="index-btn" onclick="startIndex()" style="flex:1">
          ▶ Start
        </button>
        <button class="btn" id="pause-btn" onclick="togglePause()"
          style="flex:1;display:none;background:rgba(76,175,133,.1);border-color:#2a6b50;color:var(--green)">
          ⏸ Pause
        </button>
      </div>
    </section>

    <!-- PROGRESS -->
    <section>
      <div class="section-label">Progress</div>
      <div class="progress-wrap" id="progress-wrap">
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
        </div>
        <div class="progress-msg" id="progress-msg">—</div>
        <div class="progress-counters">
          <div class="counter">
            <span class="counter-val" id="c-files">0</span>
            <span class="counter-lbl">Files</span>
          </div>
          <div class="counter">
            <span class="counter-val" id="c-chunks">0</span>
            <span class="counter-lbl">Chunks</span>
          </div>
          <div class="counter">
            <span class="counter-val" id="c-repos">0/0</span>
            <span class="counter-lbl">Repos</span>
          </div>
          <div class="counter">
            <span class="counter-val" id="c-errs" style="color:var(--red)">0</span>
            <span class="counter-lbl">Errors</span>
          </div>
          <div class="counter">
            <span class="counter-val" id="c-cache" style="color:var(--amber-dim)">0</span>
            <span class="counter-lbl">Cached</span>
          </div>
        </div>
        <button class="btn btn-pause" id="pause-btn" onclick="togglePause()">⏸ Pause</button>
      </div>
      <div id="progress-idle" style="font-family:var(--mono);font-size:10px;color:var(--muted)">
        No active job.
      </div>
    </section>

    <!-- REPO FILTER -->
    <section>
      <div class="section-label">Indexed Repos</div>
      <div class="repo-list" id="repo-list">
        <div style="font-family:var(--mono);font-size:10px;color:var(--muted)">No repos indexed yet.</div>
      </div>
    </section>

    <!-- DANGER ZONE -->
    <section style="margin-top:auto">
      <div class="section-label">Danger Zone</div>
      <div class="field" style="margin-bottom:8px">
        <label>Delete all chunks for user</label>
        <input type="text" id="del-username" placeholder="username"/>
      </div>
      <button class="btn btn-danger" onclick="deleteUser()">✕ Purge User Index</button>
    </section>

  </aside>

  <!-- ── MAIN ── -->
  <main class="main">

    <!-- SEARCH BAR -->
    <div class="search-bar">
      <div class="search-wrap" style="flex:1">
        <input type="text" id="search-input" placeholder="Semantic search across all indexed code…"
               onkeydown="if(event.key==='Enter')doSearch()"/>
      </div>
      <select id="repo-select" onchange="doSearch()" title="Filter by repo">
        <option value="">All repos</option>
      </select>
      <select id="n-select" class="n-select" title="Results count">
        <option value="8">8</option>
        <option value="12" selected>12</option>
        <option value="20">20</option>
        <option value="40">40</option>
      </select>
      <div class="spinner" id="search-spinner"></div>
    </div>

    <!-- RESULTS -->
    <div class="results-area" id="results-area">
      <div class="empty-state" id="empty-state">
        <div class="big">⌕</div>
        <p>Index a GitHub user on the left,<br/>then search their repositories semantically.</p>
      </div>
    </div>

  </main>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
let activeRepoFilter = '';
let sseSource = null;

// ── TOAST ──────────────────────────────────────────────────────────────────
function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `show ${type}`;
  setTimeout(() => { t.className = ''; }, 3200);
}

// ── STATS ──────────────────────────────────────────────────────────────────
async function refreshStats() {
  try {
    const r = await fetch('/api/stats').then(r => r.json());
    document.getElementById('stat-chunks').textContent = r.total_chunks.toLocaleString();
    document.getElementById('stat-repos').textContent  = r.total_repos;
    renderRepoList(r.repos);
    renderRepoSelect(r.repos);
  } catch {}
}

// ── REPO LIST ───────────────────────────────────────────────────────────────
function renderRepoList(repos) {
  const el = document.getElementById('repo-list');
  if (!repos.length) {
    el.innerHTML = '<div style="font-family:var(--mono);font-size:10px;color:var(--muted)">No repos indexed yet.</div>';
    return;
  }
  el.innerHTML = repos.map(r => `
    <div class="repo-tag${r===activeRepoFilter?' active':''}" onclick="setFilter('${r}')">
      <span>${r}</span>
      <span class="dot"></span>
    </div>`).join('');
}

function renderRepoSelect(repos) {
  const sel = document.getElementById('repo-select');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All repos</option>' +
    repos.map(r => `<option value="${r}"${r===cur?' selected':''}>${r}</option>`).join('');
}

function setFilter(repo) {
  activeRepoFilter = activeRepoFilter === repo ? '' : repo;
  document.getElementById('repo-select').value = activeRepoFilter;
  document.querySelectorAll('.repo-tag').forEach(t => {
    t.classList.toggle('active', t.querySelector('span')?.textContent === activeRepoFilter);
  });
  if (document.getElementById('search-input').value.trim()) doSearch();
}

// ── INDEXING ────────────────────────────────────────────────────────────────
async function startIndex() {
  const username = document.getElementById('username-input').value.trim();
  const token    = document.getElementById('token-input').value.trim();
  if (!username) { toast('Enter a GitHub username.', 'err'); return; }

  document.getElementById('index-btn').disabled = true;
  showProgress(true);

  try {
    const r = await fetch('/api/index', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username, token})
    });
    if (!r.ok) {
      const e = await r.json();
      toast(e.detail || 'Error starting index.', 'err');
      document.getElementById('index-btn').disabled = false;
      showProgress(false);
      return;
    }
    toast(`Indexing started for ${username}…`);
    startSSE();
  } catch (e) {
    toast('Network error.', 'err');
    document.getElementById('index-btn').disabled = false;
    showProgress(false);
  }
}

function showProgress(show) {
  document.getElementById('progress-wrap').classList.toggle('active', show);
  document.getElementById('progress-idle').style.display = show ? 'none' : '';
}

function startSSE() {
  if (sseSource) sseSource.close();
  sseSource = new EventSource('/api/status/stream');
  sseSource.onmessage = (e) => {
    const s = JSON.parse(e.data);
    updateProgress(s);
    if (s.state === 'done' || s.state === 'error') {
      sseSource.close();
      sseSource = null;
      document.getElementById('index-btn').disabled = false;
      if (s.state === 'done') {
        toast('Indexing complete!', 'ok');
        refreshStats();
        showProgress(false);
      } else {
        toast(s.progress, 'err');
        showProgress(false);
      }
    }
  };
}

function updateProgress(s) {
  document.getElementById('progress-msg').textContent  = s.progress || '—';
  document.getElementById('c-files').textContent       = s.indexed_files.toLocaleString();
  document.getElementById('c-chunks').textContent      = s.indexed_chunks.toLocaleString();
  document.getElementById('c-repos').textContent       = `${s.repos_done}/${s.repos_total}`;
  document.getElementById('c-errs').textContent        = s.errors;
  document.getElementById('c-cache').textContent       = s.cache_hits || 0;

  const pct = s.repos_total > 0
    ? Math.round((s.repos_done / s.repos_total) * 100)
    : (s.state === 'running' ? 5 : 0);
  document.getElementById('progress-bar').style.width = pct + '%';
}

// ── SEARCH ─────────────────────────────────────────────────────────────────
let searchTimer = null;
document.getElementById('search-input').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(doSearch, 380);
});

async function doSearch() {
  const query = document.getElementById('search-input').value.trim();
  if (!query) {
    renderEmpty();
    return;
  }
  const repo_filter = document.getElementById('repo-select').value;
  const n_results   = parseInt(document.getElementById('n-select').value);

  activeRepoFilter = repo_filter;

  const spinner = document.getElementById('search-spinner');
  spinner.classList.add('active');

  try {
    const r = await fetch('/api/search', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({query, n_results, repo_filter})
    });
    const data = await r.json();
    renderResults(data);
  } catch (e) {
    toast('Search error.', 'err');
  } finally {
    spinner.classList.remove('active');
  }
}

// ── RENDER RESULTS ──────────────────────────────────────────────────────────
function renderEmpty() {
  const area = document.getElementById('results-area');
  area.innerHTML = `
    <div class="empty-state">
      <div class="big">⌕</div>
      <p>Index a GitHub user on the left,<br/>then search their repositories semantically.</p>
    </div>`;
}

function renderResults(data) {
  const area = document.getElementById('results-area');
  if (!data.results.length) {
    area.innerHTML = `
      <div class="empty-state">
        <div class="big">∅</div>
        <p>No results for <b style="color:var(--amber)">"${esc(data.query)}"</b><br/>
        ${data.total_indexed === 0
          ? 'Nothing has been indexed yet.'
          : `Searched ${data.total_indexed.toLocaleString()} chunks.`}
        </p>
      </div>`;
    return;
  }

  const meta = `<div class="results-meta">
    <b>${data.results.length}</b> results for
    "<b style="color:var(--text-hi)">${esc(data.query)}</b>" ·
    ${data.total_indexed.toLocaleString()} chunks indexed
  </div>`;

  const cards = data.results.map((r, i) => renderCard(r, i)).join('');
  area.innerHTML = meta + cards;
}

function renderCard(r, i) {
  const m    = r.metadata;
  const ext  = (m.ext || '').replace('.','') || '?';
  const path = m.path || r.id;
  const repo = m.repo_name || m.repo || '';
  const url  = m.url || '#';
  const sc   = r.score;
  const scoreClass = sc > 0.75 ? 'score-hi' : sc > 0.5 ? 'score-mid' : 'score-lo';
  const delay = i * 0.04;
  const chunk = m.chunk !== undefined ? `chunk ${m.chunk}` : '';
  const code  = esc(r.text);
  const cardId = `card-${i}`;

  return `
  <div class="result-card" style="animation-delay:${delay}s" id="${cardId}">
    <div class="card-header" onclick="toggleCard(this)">
      <div class="card-left">
        <span class="card-ext">${esc(ext)}</span>
        <span class="card-path" title="${esc(path)}">${esc(path)}</span>
      </div>
      <span class="card-repo">${esc(repo)}</span>
      <span class="card-score ${scoreClass}">${(sc*100).toFixed(1)}%</span>
    </div>
    <div class="card-body">
      <pre class="card-code">${code}</pre>
      <div class="card-actions">
        <button class="act-btn" onclick="actOpenUrl('${esc(url)}', this)">⎋ Open on GitHub</button>
        <button class="act-btn" onclick="actClone('${esc(m.repo||'')}', this)">⬇ Clone Repo</button>
        <button class="act-btn" onclick="actOpenEditor('${esc(m.repo||'')}','${esc(path)}','${esc(url)}', this)">✎ Open in Editor</button>
        <button class="act-btn" onclick="toggleShell('${cardId}')">$ Shell</button>
        <button class="act-btn" onclick="copyChunk(this, ${JSON.stringify(r.text)})">⎘ Copy</button>
      </div>
      <div class="shell-row" id="${cardId}-shell">
        <input type="text" placeholder="e.g. grep -n {text} *.py  or  echo {url}" id="${cardId}-cmd"/>
        <button class="act-btn" onclick="runShell('${cardId}','${esc(m.repo||'')}','${esc(path)}','${esc(url)}')">Run</button>
      </div>
      <pre class="shell-output" id="${cardId}-out"></pre>
      <div class="card-footer">
        <span class="card-chunk">${esc(chunk)}</span>
        <a class="card-link" href="${esc(url)}" target="_blank" rel="noopener">Open on GitHub ↗</a>
      </div>
    </div>
  </div>`;
}

function toggleCard(header) {
  const body = header.nextElementSibling;
  body.classList.toggle('open');
}

// ── DELETE ──────────────────────────────────────────────────────────────────
async function deleteUser() {
  const username = document.getElementById('del-username').value.trim();
  if (!username) { toast('Enter a username to purge.', 'err'); return; }
  if (!confirm(`Delete ALL indexed chunks for "${username}"?`)) return;
  try {
    const r = await fetch('/api/index', {
      method: 'DELETE',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username})
    });
    const d = await r.json();
    toast(`Deleted ${d.deleted_chunks} chunks for ${username}.`, 'ok');
    refreshStats();
  } catch { toast('Delete failed.', 'err'); }
}

// ── PAUSE / RESUME ──────────────────────────────────────────────────────────
let isPaused = false;
async function togglePause() {
  const btn = document.getElementById('pause-btn');
  isPaused = !isPaused;
  const endpoint = isPaused ? '/api/pause' : '/api/resume';
  await fetch(endpoint, { method: 'POST' });
  btn.textContent = isPaused ? '▶ Resume' : '⏸ Pause';
  btn.classList.toggle('paused', isPaused);
  toast(isPaused ? 'Indexing paused.' : 'Indexing resumed.', isPaused ? '' : 'ok');
}

// ── OS ACTIONS ───────────────────────────────────────────────────────────────
async function exec(body) {
  const r = await fetch('/api/exec', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  return r.json();
}

async function actOpenUrl(url, btn) {
  btn.classList.add('running');
  btn.textContent = '…';
  const d = await exec({ action:'open_url', url });
  btn.classList.remove('running');
  btn.textContent = '⎋ Open on GitHub';
  if (!d.ok) { btn.classList.add('err'); toast(d.detail||'Error', 'err'); }
}

async function actClone(repo, btn) {
  if (!repo) { toast('No repo info.', 'err'); return; }
  btn.classList.add('running');
  btn.textContent = '⬇ Cloning…';
  const d = await exec({ action:'clone', repo });
  btn.classList.remove('running');
  btn.textContent = '⬇ Clone Repo';
  if (d.ok) toast(d.msg, 'ok');
  else { btn.classList.add('err'); toast(d.detail||d.msg||'Clone failed', 'err'); }
}

async function actOpenEditor(repo, path, url, btn) {
  btn.classList.add('running');
  btn.textContent = '✎ Opening…';
  const d = await exec({ action:'open_editor', repo, path, url });
  btn.classList.remove('running');
  btn.textContent = '✎ Open in Editor';
  if (d.ok) toast(d.msg, 'ok');
  else { btn.classList.add('err'); toast(d.detail||d.msg||'Error', 'err'); }
}

function toggleShell(cardId) {
  const row = document.getElementById(cardId+'-shell');
  row.classList.toggle('open');
  if (row.classList.contains('open')) {
    document.getElementById(cardId+'-cmd').focus();
  }
}

async function runShell(cardId, repo, path, url) {
  const cmd = document.getElementById(cardId+'-cmd').value.trim();
  if (!cmd) return;
  const outEl = document.getElementById(cardId+'-out');
  outEl.classList.add('open');
  outEl.textContent = '⟳ running…';
  // Grab chunk text from the card's pre element
  const text = document.querySelector(`#${cardId} .card-code`)?.textContent || '';
  const d = await exec({ action:'shell', cmd, repo, path, url, text });
  outEl.textContent = d.output || (d.ok ? '(no output)' : d.detail || 'Error');
}

function copyChunk(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied';
    setTimeout(() => { btn.textContent = '⎘ Copy'; }, 1800);
  });
}

// ── UTILS ───────────────────────────────────────────────────────────────────
function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── INIT ────────────────────────────────────────────────────────────────────
refreshStats();
setInterval(refreshStats, 15_000);

// Resume SSE if server was already indexing
fetch('/api/status').then(r=>r.json()).then(s => {
  if (s.state === 'running') {
    showProgress(true);
    document.getElementById('index-btn').disabled = true;
    startSSE();
    updateProgress(s);
  }
});
</script>
</body>
</html>
